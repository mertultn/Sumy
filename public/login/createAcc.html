<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumy - Hesap Oluştur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #000000, #120720);
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif; 
            flex-direction: column;
            display: flex;
            justify-content: center;
            color: black;
            align-items: center;
            height: 100vh;
        }


        #name {
            flex-direction: row;
            display: flex;
            gap: 75px;
            margin-bottom: 30px;
        }

        #nickname, #realname {
            border-radius: 16px;
            width: 200px;
            height: 50px;
            padding: 10px 12px;
            border: none;
            font-size: 14px;
            text-align: center;
            background: #ffffff;
        }

        #password {
            flex-direction: row;
            display: flex;
            gap: 75px;
        }

        #passwd, #sure-passwd {
            border-radius: 16px;
            width: 200px;
            height: 50px;
            padding: 10px 12px;
            border: none;
            font-size: 14px;
            text-align: center;
        }

        .input-group {
            flex-direction: column;
            display: flex;
            gap: 6px;
        }

        #create-btn {
            border-radius: 16px;
            width: 200px;
            height: 50px;
            border: none;
            font-size: 20px;
            text-align: center;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translate(-50%);
            color: rgb(255, 255, 255);
            background: none;
            padding: 12px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: normal;
        }

        label {
            font-size: 14px;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 17px;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 50px;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        #pp-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 20px;
            border: 3px solid white;
        }

        #pp-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <button onclick="window.location.href='/welcome'" id="back-btn">← Geri</button>
    
    <h1>Hoşgeldin</h1>
    <h2>Hesap Oluştur</h2>

    <div id="pp-container" onclick="document.getElementById('pp').click()">
        <img id="pp-preview" src="/images/default-avatar.png" />
        <input id="pp" type="file" accept="image/*" style="display:none" onchange="previewPP(this)" />
    </div>

    <div id="name">
        <div class="input-group">
            <label>Takma Ad</label>
            <input id="nickname" type="text" placeholder="Bir takma ad seç" />
        </div>
        <div class="input-group">
            <label>Gerçek İsim</label>
            <input id="realname" type="text" placeholder="Gerçek adın nedir" />
        </div>
    </div>

    <div id="password">
        <div class="input-group">
            <label>Şifre</label>
            <input id="passwd" type="text" placeholder="Bir şifre belirle" />
        </div>

        <div class="input-group">
            <label>Şifreyi Onayla</label>
            <input id="sure-passwd" type="text" placeholder="Şifreni tekrar gir" />
        </div>
    </div>

    
    <button id="create-btn" onclick="createAccount()">Hesap Oluştur</button>
    

    <script>
        function previewPP(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('pp-preview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function createAccount() {
            const nickname = document.getElementById('nickname').value;
            const realname = document.getElementById('realname').value;
            const password = document.getElementById('passwd').value;
            const surePasswd = document.getElementById('sure-passwd').value;
            const profilePic = document.getElementById('pp').files[0];

            if (password !== surePasswd) {
                alert('Şifreler eşleşmiyor!');
                return;
            }

            const formData = new FormData();
            formData.append('nickname', nickname);
            formData.append('realname', realname);
            formData.append('password', password);
            if (profilePic) formData.append('profilePic', profilePic);

        fetch('/kayit', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.basarili) {
                window.location.href = '/haveAcc';
            } else {
                alert(data.hata)
            }
        });
        }
    </script>
</body>
</html>
