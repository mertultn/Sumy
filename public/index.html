<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumy - Chat</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        color: white; 
        background: linear-gradient(135deg, #000000, #090411); 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
    }

    button { 
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 16px;
        }

    #top-bar { 
        height: 50px; 
        background: #000000; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 0 16px; 
        border-bottom: 1px solid #ffffff20;
    }

    #main { 
        display: flex; 
        flex: 1; 
        overflow: hidden; 
    }

    #left-menu {
        width: 250px; 
        background: black; 
        border-right: 1px solid #ffffff20; 
        display: flex; 
        flex-direction: 
        column; 
        padding: 16px; 
        gap: 12px; 
        overflow-y: auto; 
    }

    #left-menu.hidden {
        display: none; 
    }

    #left-menu input { 
        width: 100%; 
        padding: 8px 12px; 
        border-radius: 8px; 
        border: none; 
        background: #ffffff20; 
        color: white; 
        font-size: 14px; 
    }

    #center { 
        flex: 1; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
    }

    .divider { 
        width: 100%; 
        border-top: 1px solid #ffffff60; 
        margin: 4px 0; 
    }

    #create-group-modal { 
        display: none; 
        flex-direction: column; 
        gap: 8px; 
        width: 100%; 
    }

    @media (max-width: 768px) {
        #center {
            height: calc(100vh - 50px);
            overflow: hidden;
        }

        #left-menu {
            width: 85%;
            position: absolute;
            z-index: 10;
            height: 100%;
            box-shadow: 4px 0 20px #00000080;
        }

        #left-menu.hidden {
            display: none;
        }

        #chat-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            -height: 0;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
        }
    }

    </style>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    
</head>
<body>
    <div id="top-bar">
        <button onclick="toggleLeft()">☰</button>
        <span>Sumy</span>
    </div>

    <div id="main">
        <div id="left-menu">
            <button onclick="showCreateGroup()">+ Grup Oluştur</button>

            <div id="create-group-modal">
                <input id="group-name" type="text" placeholder="Grup adı" />
                <input id="group-password" type="password" placeholder="Şifre (isteğe bağlı)" />
                <button onclick="createGroup()">Oluştur</button>
                <button onclick="hideCreateGroup()">İptal</button>
            </div>

            <input type="text" placeholder="Grup ID'si ara..." id="group-search" />
            <div id="search-results"></div>
            <div class="divider"></div>
            <div style="font-size:13px;color:#ffffff60;">Gruplarım</div>
            <div id="group-list"></div>
        </div>

        <div id="center">
            <div id="welcome-screen" style="text-align:center;">
                <div style="font-size:32px;">Hoşgeldin</div>
                <div style="font-size:16px;color:#ffffff60;margin-top:8px;">Sohbet etmek için bir gruba katıl</div>
        </div>

         <div id="chat-screen" style="display:none; flex-direction:column; width:100%; height:100%;">
            <div id="chat-header" style="padding:12px 16px; border-bottom:1px solid #ffffff20; font-size:16px;"></div>
            <div id="chat-messages" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px;"></div>
            <div style="padding:12px 16px; border-top:1px solid #ffffff20; display:flex; gap:8px;">
                <input id="chat-input" type="text" placeholder="Mesaj yaz..." style="flex:1; padding:10px 12px; border-radius:8px; border:none; background:#ffffff20; color:white; font-size:14px;" />
                <button onclick="sendMessage()" style="padding:10px 16px; background:#ffffff20; border-radius:8px; font-size:14px;">Gönder</button>
            </div>
        </div>
</div>

                <div id="chat-header" style="padding:12px 16px; border-bottom:1px solid #ffffff20; font-size:16px;"></div>
                <div id="chat-messages" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px;"></div>
                <div style="padding:12px 16px; border-top:1px solid #ffffff20; display:flex; gap:8px;">
                    <input id="chat-input" type="text" placeholder="Mesaj yaz..." style="flex:1; padding:10px 12px; border-radius:8px; border:none; background:#ffffff20; color:white; font-size:14px;" />
                    <button onclick="sendMessage()" style="padding:10px 16px; background:#ffffff20; border-radius:8px; font-size:14px;">Gönder</button>
                </div>
            </div>
        </div>
<script src="/socket.io/socket.io.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
